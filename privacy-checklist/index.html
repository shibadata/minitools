<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Privacy: Checklist</title>
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --card2:#1d212a; --line:#2a2f3a;
    --txt:#e7e9ee; --muted:#9aa3b2; --accent:#4ea1ff; --done:#3ecf8e;
    --warn:#ffb454;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f4f6f9; --card:#ffffff; --card2:#f0f3f8; --line:#e2e6ee;
      --txt:#1b2230; --muted:#5a6678; --accent:#1f6fd6; --done:#1aa46a;
      --warn:#c47a12;
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--txt);
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55; font-size:15px;
  }
  .wrap{max-width:860px; margin:0 auto; padding:24px 18px 80px}
  header{margin-bottom:18px}
  h1{font-size:22px; margin:0 0 4px}
  .sub{color:var(--muted); font-size:13px; margin:0}
  .meta{color:var(--muted); font-size:12.5px; margin-top:6px}

  .progress{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin:14px 0 22px; position:sticky; top:8px; z-index:5;
    backdrop-filter:saturate(1.2);
  }
  .pbar{height:10px; background:var(--card2); border-radius:99px; overflow:hidden; margin-top:8px}
  .pbar > i{display:block; height:100%; width:0; background:var(--done); transition:width .25s}
  .pstat{display:flex; justify-content:space-between; font-size:13px; color:var(--muted)}

  section{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:6px 16px 14px; margin:0 0 16px;
  }
  section > h2{
    font-size:16px; margin:14px 0 6px; display:flex; gap:8px; align-items:baseline;
  }
  section > h2 .c{color:var(--muted); font-size:12.5px; font-weight:500}
  .note{
    color:var(--muted); font-size:13px; margin:2px 0 10px;
    border-left:2px solid var(--line); padding-left:10px;
  }

  ul{list-style:none; margin:0; padding:0}
  li.item{
    display:flex; gap:10px; align-items:flex-start;
    padding:9px 8px; border-radius:9px; border:1px solid transparent;
  }
  li.item:hover{background:var(--card2)}
  li.item.checked{opacity:.62}
  li.item.checked .txt{text-decoration:line-through; text-decoration-color:var(--muted)}
  input[type=checkbox]{
    appearance:none; -webkit-appearance:none; flex:0 0 auto;
    width:20px; height:20px; margin-top:1px; border:2px solid var(--line);
    border-radius:6px; background:var(--card2); cursor:pointer; position:relative;
  }
  input[type=checkbox]:checked{background:var(--done); border-color:var(--done)}
  input[type=checkbox]:checked::after{
    content:""; position:absolute; left:6px; top:2px; width:5px; height:10px;
    border:solid #fff; border-width:0 2.5px 2.5px 0; transform:rotate(45deg);
  }
  .txt{flex:1}
  .txt b{color:var(--txt)}
  .warn b, .txt .warn{color:var(--warn)}
  .txt code{
    background:var(--card2); border:1px solid var(--line); border-radius:5px;
    padding:1px 5px; font-size:12.5px;
  }

  .actions{display:flex; gap:10px; flex-wrap:wrap; margin-top:18px}
  button{
    background:var(--card2); border:1px solid var(--line); color:var(--txt);
    border-radius:9px; padding:8px 14px; font-size:13.5px; cursor:pointer;
  }
  button:hover{border-color:var(--accent)}
  button.danger:hover{border-color:#ff6b6b; color:#ff8585}
  footer{color:var(--muted); font-size:12px; text-align:center; margin-top:24px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>AI Privacy Checklist</h1>
    <p>Tiến độ tự động lưu theo trình duyệt và chỉ nằm trên máy bạn</p>
    <p>Lưu ý các nền tảng thay đổi chính sách liên tục, đây là danh sách để tiện theo dõi, bạn nên tìm thay đổi setting cụ thể</p>
     </header>

  <div class="progress">
    <div class="pstat"><span id="pText">0 / 0 mục</span><span id="pPct">0%</span></div>
    <div class="pbar"><i id="pFill"></i></div>
  </div>

  <div id="list"></div>

  <div class="actions">
    <button id="btnReset" class="danger">Bỏ tích toàn bộ</button>
    <button id="btnExport">Xuất tiến độ (.json)</button>
  </div>

  <footer>&#169;Shiba-2026</footer>
</div>

<script>
const DATA = [
  {
    n:"1", t:"Tắt dùng dữ liệu để huấn luyện (training opt-out)",
    items:[
      `<b>ChatGPT</b>: Profile → Settings → Data Controls → tắt "Improve the model for everyone". (Free/Plus/Pro mặc định ĐANG BẬT.)`,
      `<b>Claude</b>: Vào <code>claude.ai/settings/data-privacy-controls</code> → tắt tùy chọn cho phép dùng dữ liệu cải thiện mô hình. (Mặc định bật từ 8/2025; tắt thì về mức lưu 30 ngày.)`,
      `<b>Gemini</b>: <code>myactivity.google.com/product/gemini</code> → tắt "Keep Activity". <span class="warn">(Đánh đổi: Gemini không lưu lại lịch sử chat.)</span>`,
      `<b>Copilot</b>: copilot.com → Profile → Privacy → tắt "Training on conversation activity" và "Training on voice conversations".`,
      `<b>Meta AI</b>: <span class="warn">Không có nút tắt thật ở Việt Nam.</span> Từ 16/12/2025 dùng chat để cá nhân hóa quảng cáo, chỉ Anh/EU/Hàn Quốc được loại trừ. Cách duy nhất với Meta AI assistant: không dùng.`,
      `<b>Facebook Messenger</b>: Vào chat: mở info (i) → Privacy & support → Message permissions → tắt "Allow message sharing". (mặc định cho phép mọi người trong chat chia sẻ tin nhắn với Meta AI, cần vào chỉnh trong từng chat, group chat cần admin chỉnh.)`,
      `<b>DeepSeek</b>: <span class="warn">Không có nút tắt;</span> dữ liệu lưu tại máy chủ Trung Quốc. Không dán dữ liệu cá nhân/bí mật công việc vào đây.`
    ]
  },
  {
    n:"2", t:"Lịch sử, bộ nhớ, chat tạm",
    items:[
      `<b>ChatGPT</b>: Xóa lịch sử (hệ thống vẫn giữ trong vòng 30 ngày kể từ khi bấm xóa)`,
      `<b>Claude</b>: Xóa hội thoại; dùng Incognito để ẩn danh.`,
      `<b>Gemini</b>: Đổi auto-delete (mặc định 18 tháng → hạ xuống 3 tháng). <span class="warn">Lưu ý:</span> dù tắt lưu activity thì Gemini vẫn giữ 72 giờ; còn hội thoại đã bị người thật duyệt thì sẽ được giữ tới 3 năm, không thế xóa.`,
      `<b>Copilot</b>: Xóa từng mục hoặc xóa toàn bộ lịch sử; rà mục <b>memory/personalization</b> (tách riêng với training, có công tắc phụ mặc định bật lấy dữ liệu từ Bing/MSN/Edge).`,
      `Chung: "temp chat" không mặc định an toàn, mặc dù là chế độ ẩn danh/tạm thì mỗi nền tảng vẫn có thời gian lưu giữ khác nhau`
    ]
  },
  {
    n:"3", t:"Tính năng share",
    items:[
      `Trước khi bấm share: hiểu rõ link công khai tới đâu, cần chú ý thường xuyên kiểm tra các link đã share và xóa nếu không cần nữa. Lưu ý nếu đã bị search engine index thì chỉ xóa được ở phía AI <span class="warn">KHÔNG xóa được bản cache trên mạng.`
    ]
  },
  {
    n:"4", t:"Quyền truy cập chéo (email/drive/lịch)",
    items:[
      `<b>Gemini</b>: Bảng "Personal Intelligence" trong Gemini kiểm soát quyền đọc Gmail/Drive/Maps/Calendar; quyền Gmail tắt riêng ở Gmail Settings → General.`,
      `Rà soát mọi AI đang có quyền truy cập vào Inbox/Drive/Calendar/Ổ cứng/Các app khác (MCP) và thu hồi các quyền không còn dùng.`
    ]
  },
  {
    n:"5", t:"Tài khoản & app nhắn tin",
    items:[
      `<b>Google Web & App Activity</b>: Vào <code>myactivity.google.com</code> rà mục này (tách biệt với Gemini, vẫn lưu khi dùng dịch vụ Google khác).`
    ]
  },
  {
    n:"6", t:"Bảo mật tài khoản nhằm hỗ trợ privacy (khóa chống trộm)",
    items:[
      `<b>Password manager</b>: Đừng lưu password vào ghi chú/trình duyệt mà hãy dùng các app quản lý pass, miễn phí cũng có nhiều ứng dụng ok.`,
      `<b>2FA</b>: Bật bảo mật 2 lớp cho các tài khoản quan trọng, lưu backup codes ở nơi an toàn khi thiết lập 2FA.`
    ]
  }
];

const STORE_KEY = "ai-privacy-checklist:v1";
const listEl = document.getElementById("list");

// build stable ids
let totalItems = 0;
DATA.forEach((sec, si) => {
  sec.items.forEach((_, ii) => totalItems++);
});

function loadState(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); }
  catch(e){ return {}; }
}
function saveState(state){
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}

function render(){
  const state = loadState();
  listEl.innerHTML = "";
  DATA.forEach((sec, si) => {
    const s = document.createElement("section");
    const h = document.createElement("h2");
    h.innerHTML = `${sec.n}. ${sec.t}`;
    s.appendChild(h);
    const ul = document.createElement("ul");
    sec.items.forEach((html, ii) => {
      const id = `s${si}i${ii}`;
      const li = document.createElement("li");
      li.className = "item" + (state[id] ? " checked" : "");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!state[id];
      cb.id = id;
      cb.addEventListener("change", () => {
        const st = loadState();
        if(cb.checked) st[id] = 1; else delete st[id];
        saveState(st);
        li.classList.toggle("checked", cb.checked);
        updateProgress();
      });
      const label = document.createElement("label");
      label.className = "txt";
      label.htmlFor = id;
      label.innerHTML = html;
      li.appendChild(cb);
      li.appendChild(label);
      ul.appendChild(li);
    });
    s.appendChild(ul);
    listEl.appendChild(s);
  });
  updateProgress();
}

function updateProgress(){
  const state = loadState();
  const done = Object.keys(state).filter(k => state[k]).length;
  const pct = totalItems ? Math.round(done / totalItems * 100) : 0;
  document.getElementById("pText").textContent = `${done} / ${totalItems} mục`;
  document.getElementById("pPct").textContent = pct + "%";
  document.getElementById("pFill").style.width = pct + "%";
}

document.getElementById("btnReset").addEventListener("click", () => {
  if(confirm("Bỏ tích toàn bộ?")){
    localStorage.removeItem(STORE_KEY);
    render();
  }
});

document.getElementById("btnExport").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify({state:loadState(), exportedAt:new Date().toISOString()}, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ai-privacy-progress.json";
  a.click();
});

render();
</script>
</body>
</html>
